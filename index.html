<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update | Sentient PMO</title>
    <style>
        :root {
            --black-pure: #000000;
            --radiant-gold: #D4AF37;
            --glass-border: rgba(212, 175, 55, 0.3);
        }
        body {
            background-color: var(--black-pure);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .maintenance-shield {
            border: 1px solid var(--glass-border);
            padding: 3rem;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }
        .mono-label {
            font-family: 'JetBrains Mono', monospace;
            color: var(--radiant-gold);
            letter-spacing: 2px;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 1.5rem 0;
            line-height: 1.1;
        }
        p {
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .btn-command {
            background: transparent;
            border: 1px solid var(--radiant-gold);
            color: var(--radiant-gold);
            padding: 1rem 2rem;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-command:hover {
            background: var(--radiant-gold);
            color: var(--black-pure);
        }
    </style>
</head>
<body>
    <div class="maintenance-shield">
        <span class="mono-label">SOVEREIGN INTELLIGENCE / v6.1</span>
        <h1>PERIMETER UNDER<br>CONSOLIDATION.</h1>
        <p>We are currently decommissioning the Manual Era and installing the Radar. The Truth Gap remains active, but our Command Center is undergoing structural refactoring.</p>
        
        <a href="mailto:michael@makcon.com?subject=Initiate%20Forensic%20Diagnostic" class="btn-command">
            SECURE THE PERIMETER ($15K)
        </a>
    </div>
</body>
</html>
