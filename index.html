<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forensic Command Center | Sentient PMO</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="data-grid"></div>

    <main>
        <!-- HERO -->
        <section class="hero">
            <div class="radar"><div class="radar-sweep"></div></div>
            <h1 class="hero-title">STOP SUBSIDIZING <br><span class="text-gold">A FICTION.</span></h1>
            <p class="hero-subtitle">Your "Green" status reports are a social construct. We adjudicate the physics.</p>
        </section>

        <!-- CALCULATOR -->
        <section class="section-calc">
            <div class="container">
                <div class="calc-grid">
                    <div>
                        <h2 class="uppercase">Adjudicate the Strike</h2>
                        <input type="number" id="zombieSpend" value="150000" class="input-box">
                        <span id="multipleVal" class="text-gold">10x</span>
                        <input type="range" id="multiple" min="1" max="25" value="10">
                    </div>
                    <div class="forensic-card">
                        <div id="totalErasure" class="erasure-value">$0</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- GLOBAL ENGINES -->
    <script src="/js/navigation.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
